[pytest]
# Pytest configuration file for LLM Self-Explanations and Faithfulness project

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Command line options to always use
addopts =
    # Verbose output
    -v
    # Show summary of all test types (failed, error, skipped, xfailed, xpassed)
    -ra
    # Show local variables in tracebacks
    --showlocals
    # Strict markers - fail on unknown markers
    --strict-markers
    # Show extra test summary info
    --tb=short
    # Coverage options (uncomment if you want coverage reports)
    # --cov=src
    # --cov-report=html
    # --cov-report=term-missing

# Markers for organizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    data_quality: marks tests that check data quality
    requires_gpu: marks tests that require GPU
    requires_api: marks tests that require API access
    smoke: marks tests as smoke tests (quick sanity checks)

# Ignore certain warnings
filterwarnings =
    # Ignore specific warnings if needed
    # ignore::DeprecationWarning
    # ignore::PendingDeprecationWarning

# Minimum Python version
minversion = 6.0

# Console output style
console_output_style = progress

# Log settings (uncomment to enable logging)
# log_cli = true
# log_cli_level = INFO
# log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
# log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (in seconds) - uncomment if needed
# timeout = 300

# Parallel execution settings (requires pytest-xdist)
# Uncomment to run tests in parallel
# -n auto  # Use all available cores
